server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Forzamos el tipo MIME de los módulos ES (.mjs) porque el mime.types por
  # defecto de nginx no los incluye y los sirve como application/octet-stream,
  # lo que rompe el worker de pdf.js bajo "strict MIME checking" del navegador.
  types {
    application/javascript            js mjs;
    text/css                          css;
    text/html                         html htm;
    image/svg+xml                     svg svgz;
    image/png                         png;
    image/jpeg                        jpg jpeg;
    image/gif                         gif;
    image/webp                        webp;
    image/x-icon                      ico;
    application/json                  json;
    application/wasm                  wasm;
    font/woff                         woff;
    font/woff2                        woff2;
    application/pdf                   pdf;
  }
  default_type application/octet-stream;

  # Compresión básica para los bundles
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Cache largo para assets versionados por hash
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback: cualquier ruta desconocida sirve index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
